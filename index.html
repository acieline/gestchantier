const calcTotaux=(lignes)=>{
  const groupes={};
  let ht=0;
  (lignes||[]).forEach(l=>{
    const q=Number(l.qte)||0,pu=Number(l.pu)||0;
    const ligneHt=q*pu;
    const taux=(l.tva===undefined||l.tva===null||l.tva==="")?20:Number(l.tva);
    ht+=ligneHt;
    groupes[taux]=(groupes[taux]||0)+ligneHt;
  });
  const detail=Object.entries(groupes).map(([taux,montantHt])=>({taux:Number(taux),ht:montantHt,tva:montantHt*(Number(taux)/100)})).sort((a,b)=>b.taux-a.taux);
  const tva=detail.reduce((s,d)=>s+d.tva,0);
  const ttc=ht+tva;
  return {ht,tva,ttc,detail};
};

  return <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>{P[name]}</svg>;
}

function Modal({title,onClose,children,wide}){

        <div style={{fontWeight:700,fontSize:15}}>{doc.client}</div>
        {doc.adresseClient&&<div style={{fontSize:13,color:COLORS.inkSoft,marginTop:2}}>{doc.adresseClient}</div>}

      <div style={{marginBottom:14}}><span style={{fontSize:11,fontWeight:700,color:COLORS.inkSoft,textTransform:"uppercase"}}>Objet : </span><span style={{fontSize:14,fontWeight:600}}>{doc.travaux}</span></div>

// ── LIGNES EDITOR ─────────────────────────────────────────────────────────────
function LignesEditor({lignes,setLignes}){
  const [descEdit,setDescEdit]=useState(null);
  const [descTemp,setDescTemp]=useState("");
  const add=()=>setLignes([...lignes,{desc:"",qte:1,pu:0,tva:20}]);
  const upd=(i,f,v)=>{const l=[...lignes];l[i]={...l[i],[f]:v};setLignes(l);};
  const del=(i)=>setLignes(lignes.filter((_,idx)=>idx!==i));
  const {ht,tva,ttc,detail}=calcTotaux(lignes);
  const openDesc=(i)=>{setDescTemp(lignes[i].desc||"");setDescEdit(i);};
  const saveDesc=()=>{upd(descEdit,"desc",descTemp);setDescEdit(null);};

    <div style={{fontSize:11,fontWeight:700,color:COLORS.inkSoft,marginBottom:8,letterSpacing:0.4,textTransform:"uppercase"}}>Prestations</div>

      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
        <input style={{...inp,width:50,flex:"1 1 50px",minWidth:44,padding:"8px 6px"}} type="number" placeholder="Qté" value={l.qte} onChange={e=>upd(i,"qte",e.target.value)}/>
        <input style={{...inp,width:70,flex:"1 1 70px",minWidth:60,padding:"8px 6px"}} type="number" placeholder="P.U.€" value={l.pu===0||l.pu===""?"":l.pu} onChange={e=>upd(i,"pu",e.target.value)}/>
        <select style={{...inp,width:64,flex:"1 1 64px",minWidth:58,padding:"8px 4px"}} value={l.tva===undefined?20:l.tva} onChange={e=>upd(i,"tva",Number(e.target.value))}>

          <span style={{fontSize:12.5,fontWeight:700,color:COLORS.blueprint,fontFamily:FONT_MONO,whiteSpace:"nowrap"}}>{((Number(l.qte)||0)*(Number(l.pu)||0)).toLocaleString("fr-FR")} €</span>
          <button onClick={()=>del(i)} style={{background:"none",border:"none",cursor:"pointer",color:COLORS.danger,fontSize:18,flexShrink:0,lineHeight:1}}>×</button>
        </div>
      </div>
    </div>)}
    <button onClick={add} style={{...btnS,marginBottom:12}}>+ Ligne</button>
    <div style={{background:COLORS.lineSoft,borderRadius:10,padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:COLORS.inkSoft,marginBottom:3}}><span>Total HT</span><span style={{fontWeight:600,fontFamily:FONT_MONO}}>{ht.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>
      {detail.map(d=><div key={d.taux} style={{display:"flex",justifyContent:"space-between",fontSize:11.5,color:COLORS.inkSoft,marginBottom:2}}><span>TVA {d.taux}% (sur {d.ht.toLocaleString("fr-FR",{minimumFractionDigits:2})} €)</span><span style={{fontWeight:600,fontFamily:FONT_MONO}}>{d.tva.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>)}
      <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:800,color:COLORS.accent,borderTop:`2px solid ${COLORS.accent}`,paddingTop:8,marginTop:6,fontFamily:FONT_MONO}}><span>TTC</span><span>{ttc.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>

    {descEdit!==null&&<Modal title="Description de la ligne" onClose={()=>setDescEdit(null)}>
      <textarea autoFocus style={{...inp,minHeight:130,resize:"vertical"}} value={descTemp} onChange={e=>setDescTemp(e.target.value)} placeholder="Décrivez la prestation…"/>

// ── AGENDA ────────────────────────────────────────────────────────────────────
function Agenda({data,api}){
  const [showForm,setShowForm]=useState(false);
  const [vue,setVue]=useState("liste");
  const [moisActuel,setMoisActuel]=useState(new Date());
  const [form,setForm]=useState({titre:"",client:"",date:TODAY,heure:"09:00",duree:60,type:"chantier",notes:""});
  const add=async()=>{
    if(!form.titre.trim())return;
    const nouveau = {...form,duree:Number(form.duree)};
    const row = await api.ajouterItem("rdv",nouveau);
    setForm({titre:"",client:"",date:TODAY,heure:"09:00",duree:60,type:"chantier",notes:""});
    setShowForm(false);
    if (row && CalendarPlugin && isCalendarSyncEnabled()) {
      try {
        const start = new Date(`${row.date}T${row.heure}:00`).getTime();
        const end = start + (Number(row.duree)||60)*60000;
        const evt = await CalendarPlugin.createEvent({ title: row.titre, location: row.client||"", startDate: start, endDate: end, description: row.notes||"" });
        if (evt && evt.id) { try { await api.modifierItem("rdv", row.id, { calendar_event_id: evt.id }); } catch(e) {} }
      } catch (e) { /* synchronisation calendrier non disponible, on ignore */ }
    }
  };
  const del=async(id)=>{
    const rdv = data.rdv.find(r=>r.id===id);
    if (rdv && rdv.calendar_event_id && CalendarPlugin && isCalendarSyncEnabled()) {
      try { await CalendarPlugin.deleteEvent({ id: rdv.calendar_event_id }); } catch (e) { /* déjà supprimé ou indisponible */ }
    }
    api.supprimerItem("rdv",id);
  };
  const rdvTries=[...data.rdv].sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  const rdvAvenir=rdvTries.filter(r=>r.date>=TODAY);
  const rdvPasses=rdvTries.filter(r=>r.date<TODAY);
  const annee=moisActuel.getFullYear(),mois=moisActuel.getMonth();
  const premierJour=new Date(annee,mois,1).getDay(),nbJours=new Date(annee,mois+1,0).getDate();
  const jours=[];for(let i=0;i<premierJour;i++)jours.push(null);for(let i=1;i<=nbJours;i++)jours.push(i);
  const rdvDuJour=(j)=>{const ds=`${annee}-${String(mois+1).padStart(2,"0")}-${String(j).padStart(2,"0")}`;return data.rdv.filter(r=>r.date===ds);};
  return <div style={{fontFamily:FONT_BODY}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><span style={{fontWeight:700,fontSize:19,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>Agenda</span><span style={{marginLeft:10,background:COLORS.blueprintBg,color:COLORS.blueprint,borderRadius:20,padding:"2px 12px",fontSize:12.5,fontWeight:600}}>{rdvAvenir.length} à venir</span></div>
      <button style={btnP} onClick={()=>setShowForm(true)}><Icon name="plus" size={13} style={{marginRight:5,verticalAlign:-2}}/>Nouveau RDV</button>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {[["liste","Liste"],["calendrier","Calendrier"]].map(([v,l])=><button key={v} onClick={()=>setVue(v)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${COLORS.line}`,background:vue===v?COLORS.ink:"#fff",color:vue===v?"#fff":COLORS.inkSoft,fontWeight:600,fontSize:12.5,cursor:"pointer",fontFamily:FONT_BODY}}>{l}</button>)}
    </div>
    {vue==="calendrier"&&<div style={{background:"#fff",borderRadius:14,border:`1px solid ${COLORS.line}`,padding:14,marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={()=>setMoisActuel(new Date(annee,mois-1,1))} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:COLORS.accent}}>‹</button>
        <span style={{fontWeight:700,fontSize:15,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>{MOIS[mois]} {annee}</span>
        <button onClick={()=>setMoisActuel(new Date(annee,mois+1,1))} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:COLORS.accent}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,textAlign:"center"}}>

// ── TÂCHES ────────────────────────────────────────────────────────────────────

          <option value="">— Sélectionner ou saisir manuellement ci-dessous —</option>

      </div>
      <IR label="Adresse client"><input style={inp} value={editForm.adresseClient} onChange={e=>setEditForm(f=>({...f,adresseClient:e.target.value}))} placeholder="Adresse complète du client"/></IR>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <IR label="Statut"><select style={inp} value={editForm.statut} onChange={e=>setEditForm(f=>({...f,statut:e.target.value}))}>{Object.entries(STATUT_DEVIS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></IR>
        <IR label="Date limite"><input type="date" style={inp} value={editForm.echeance} onChange={e=>setEditForm(f=>({...f,echeance:e.target.value}))}/></IR>
      </div>
      <div style={{marginBottom:12}}><LignesEditor lignes={editForm.lignes} setLignes={l=>setEditForm(f=>({...f,lignes:l}))}/></div>
      <IR label="Notes"><input style={inp} value={editForm.notes} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} placeholder="Conditions, remarques…"/></IR>

    </Modal>}
    {apercu&&<ApercuDoc doc={apercu.doc} type={apercu.type} entreprise={data.entreprise} onClose={()=>setApercu(null)}/>}
  </div>;
}

// ── FACTURES ──────────────────────────────────────────────────────────────────
function Factures({data,api}){
  const [showForm,setShowForm]=useState(false);
  const [apercu,setApercu]=useState(null);
  const [form,setForm]=useState({client:"",adresseClient:"",travaux:"",lignes:[{desc:"",qte:1,pu:0,tva:20}],tauxTva:20,statut:"envoyee",dateEmission:TODAY,dateEcheance:"",notes:""});
  const nextNum=()=>`FAC-${new Date().getFullYear()}-${(data.factures.length+1).toString().padStart(3,"0")}`;
  const add=()=>{if(!form.client.trim())return;api.ajouterItem("factures",{...form,numero:nextNum()});setForm({client:"",adresseClient:"",travaux:"",lignes:[{desc:"",qte:1,pu:0,tva:20}],tauxTva:20,statut:"envoyee",dateEmission:TODAY,dateEcheance:"",notes:""});setShowForm(false);};
  const del=(id)=>api.supprimerItem("factures",id);
  const updStatut=(id,statut)=>api.modifierItem("factures",id,{statut});
  const totalPaye=data.factures.filter(f=>f.statut==="payee").reduce((s,f)=>s+calcTotaux(f.lignes,f.tauxTva).ttc,0);
  const totalAttente=data.factures.filter(f=>f.statut!=="payee").reduce((s,f)=>s+calcTotaux(f.lignes,f.tauxTva).ttc,0);
  return <div style={{fontFamily:FONT_BODY}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <span style={{fontWeight:700,fontSize:19,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>Factures</span>
      <button style={btnP} onClick={()=>setShowForm(true)}><Icon name="plus" size={13} style={{marginRight:5,verticalAlign:-2}}/>Nouvelle facture</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
      <div style={{background:COLORS.successBg,border:`1px solid ${COLORS.success}30`,borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:11,color:COLORS.success,fontWeight:700,textTransform:"uppercase",letterSpacing:0.3}}>Encaissé</div>
        <div style={{fontSize:19,fontWeight:800,color:COLORS.success,marginTop:4,fontFamily:FONT_MONO}}>{totalPaye.toLocaleString("fr-FR",{maximumFractionDigits:0})} €</div>
      </div>
      <div style={{background:COLORS.pendingBg,border:`1px solid ${COLORS.pending}30`,borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:11,color:COLORS.pending,fontWeight:700,textTransform:"uppercase",letterSpacing:0.3}}>En attente</div>
        <div style={{fontSize:19,fontWeight:800,color:COLORS.pending,marginTop:4,fontFamily:FONT_MONO}}>{totalAttente.toLocaleString("fr-FR",{maximumFractionDigits:0})} €</div>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {data.factures.map(f=>{const {ttc}=calcTotaux(f.lignes,f.tauxTva);return <div key={f.id} style={{background:"#fff",border:`1px solid ${COLORS.line}`,borderRadius:14,padding:15}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={{fontSize:11,color:COLORS.inkSoft,fontWeight:600,fontFamily:FONT_MONO}}>{f.numero}</div><div style={{fontWeight:700,color:COLORS.ink,fontSize:14.5,marginTop:2}}>{f.client}</div><div style={{color:COLORS.inkSoft,fontSize:12.5,marginTop:2}}>{f.travaux}</div></div>
          <div style={{fontWeight:800,fontSize:16,color:COLORS.blueprint,fontFamily:FONT_MONO}}>{ttc.toLocaleString("fr-FR",{maximumFractionDigits:0})} € TTC</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:12,flexWrap:"wrap"}}>
          <select value={f.statut} onChange={e=>updStatut(f.id,e.target.value)} style={{border:"none",background:STATUT_FACTURE[f.statut]?.bg,color:STATUT_FACTURE[f.statut]?.color,borderRadius:6,padding:"3px 8px",fontWeight:600,fontSize:11.5,cursor:"pointer",fontFamily:FONT_BODY}}>{Object.entries(STATUT_FACTURE).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
          <span style={{fontSize:11.5,color:COLORS.inkSoft,fontFamily:FONT_MONO}}>{new Date((f.dateEmission||TODAY)+"T12:00:00").toLocaleDateString("fr-FR")}</span>
          {f.dateEcheance&&<span style={{fontSize:11.5,color:COLORS.inkSoft,fontFamily:FONT_MONO}}>Éch. {new Date(f.dateEcheance+"T12:00:00").toLocaleDateString("fr-FR")}</span>}
          <div style={{marginLeft:"auto",display:"flex",gap:6}}>
            <button style={btnS} onClick={()=>setApercu({doc:f,type:"facture"})}>PDF</button>
            <button onClick={()=>del(f.id)} style={btnD}>Suppr.</button>
          </div>
        </div>
      </div>;})}
      {data.factures.length===0&&<div style={{textAlign:"center",color:COLORS.inkSoft,padding:28,fontSize:13.5}}>Aucune facture — convertissez un devis accepté !</div>}
    </div>
    {showForm&&<Modal title="Nouvelle facture" onClose={()=>setShowForm(false)} wide>
      {(data.clients||[]).length>0&&<IR label="Client existant (facultatif)">
        <select style={inp} value="" onChange={e=>{const c=(data.clients||[]).find(cl=>cl.id===e.target.value);if(c)setForm(f=>({...f,client:c.nom,adresseClient:c.adresse||""}));}}>
          <option value="">— Sélectionner ou saisir manuellement ci-dessous —</option>
          {(data.clients||[]).map(c=><option key={c.id} value={c.id}>{c.nom}{c.entreprise?" ("+c.entreprise+")":""}</option>)}
        </select>
      </IR>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <IR label="Client *"><input style={inp} value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Nom du client"/></IR>
        <IR label="Travaux"><input style={inp} value={form.travaux} onChange={e=>setForm(f=>({...f,travaux:e.target.value}))} placeholder="Description"/></IR>
      </div>
      <IR label="Adresse client"><input style={inp} value={form.adresseClient} onChange={e=>setForm(f=>({...f,adresseClient:e.target.value}))} placeholder="Adresse complète"/></IR>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <IR label="Statut"><select style={inp} value={form.statut} onChange={e=>setForm(f=>({...f,statut:e.target.value}))}>{Object.entries(STATUT_FACTURE).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></IR>
        <IR label="Date émission"><input type="date" style={inp} value={form.dateEmission} onChange={e=>setForm(f=>({...f,dateEmission:e.target.value}))}/></IR>
        <IR label="Date échéance"><input type="date" style={inp} value={form.dateEcheance} onChange={e=>setForm(f=>({...f,dateEcheance:e.target.value}))}/></IR>
      </div>
      <div style={{marginBottom:12}}><LignesEditor lignes={form.lignes} setLignes={l=>setForm(f=>({...f,lignes:l}))}/></div>
      <IR label="Notes"><input style={inp} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Conditions de paiement…"/></IR>
      <div style={{display:"flex",gap:10,marginTop:8}}><button style={btnP} onClick={add}>Créer la facture</button><button style={btnS} onClick={()=>setShowForm(false)}>Annuler</button></div>
    </Modal>}
    {apercu&&<ApercuDoc doc={apercu.doc} type={apercu.type} entreprise={data.entreprise} onClose={()=>setApercu(null)}/>}
  </div>;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({data,onNavigate}){
  const rdvAuj=data.rdv.filter(r=>r.date===TODAY);
  const urgent=data.taches.filter(t=>!t.fait&&t.priorite==="haute");
  const chantiersActifs=data.chantiers.filter(c=>c.statut==="en_cours");
  const vedette=chantiersActifs.sort((a,b)=>(b.avancement||0)-(a.avancement||0))[0];

  const Stat=({icon,label,value,onClick})=><button onClick={onClick} style={{background:"#fff",border:`1px solid ${COLORS.line}`,borderRadius:14,padding:"14px 12px",textAlign:"left",cursor:onClick?"pointer":"default",fontFamily:FONT_BODY}}>
    <div style={{width:38,height:38,borderRadius:11,background:COLORS.accent,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:9}}><Icon name={icon} size={18} color="#fff"/></div>
    <div style={{fontSize:20,fontWeight:800,color:COLORS.ink,fontFamily:FONT_DISPLAY,lineHeight:1}}>{value}</div>
    <div style={{fontSize:11.5,fontWeight:500,color:COLORS.inkSoft,marginTop:3}}>{label}</div>
  </button>;

  // Flux d'activité récente (RDV du jour + tâches urgentes), fusionnés et triés
  const activites=[
    ...rdvAuj.map(r=>({key:"rdv-"+r.id,icon:"calendar",titre:r.titre,sous:`${r.heure} · ${r.duree}min`,color:COLORS.blueprint})),
    ...urgent.map(t=>({key:"tache-"+t.id,icon:"alert",titre:t.titre,sous:"Tâche urgente",color:COLORS.danger})),
  ].slice(0,5);

  return <div style={{fontFamily:FONT_BODY}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <span style={{fontWeight:700,fontSize:19,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>Mes chantiers</span>
      <button onClick={()=>onNavigate("chantiers")} style={{background:"none",border:"none",color:COLORS.accent,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:FONT_BODY}}>Voir tout</button>
    </div>

    {vedette?<div onClick={()=>onNavigate("chantiers")} style={{background:"#fff",border:`1px solid ${COLORS.line}`,borderRadius:16,overflow:"hidden",marginBottom:18,cursor:"pointer",boxShadow:"0 2px 10px rgba(28,35,33,0.05)"}}>
      <div style={{height:110,background:`linear-gradient(135deg, ${COLORS.blueprint} 0%, ${COLORS.ink} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
        <Icon name="building" size={44} color="rgba(255,255,255,0.25)"/>
        <div style={{position:"absolute",top:10,right:10,background:COLORS.accent,color:"#fff",fontSize:10.5,fontWeight:700,padding:"3px 10px",borderRadius:20}}>EN COURS</div>
      </div>
      <div style={{padding:14}}>
        <div style={{fontWeight:700,fontSize:15.5,color:COLORS.ink}}>{vedette.nom}</div>
        <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3,marginBottom:10}}><Icon name="pin" size={12} color={COLORS.inkSoft}/><span style={{fontSize:12.5,color:COLORS.inkSoft}}>{vedette.client}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
          <div style={{flex:1,background:COLORS.lineSoft,borderRadius:8,height:8,overflow:"hidden",marginRight:12}}><div style={{height:"100%",width:(vedette.avancement||0)+"%",background:COLORS.accent,borderRadius:8}}/></div>
          <span style={{fontWeight:800,fontSize:15,color:COLORS.accent,fontFamily:FONT_MONO}}>{vedette.avancement||0}%</span>
        </div>
      </div>
    </div>:<div style={{background:"#fff",border:`1px dashed ${COLORS.line}`,borderRadius:16,padding:24,textAlign:"center",marginBottom:18,color:COLORS.inkSoft,fontSize:13}}>Aucun chantier en cours pour le moment</div>}

    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:20}}>
      <Stat icon="check" label="Tâches en cours" value={data.taches.filter(t=>!t.fait).length} onClick={()=>onNavigate("taches")}/>
      <Stat icon="file" label="Devis à faire" value={data.devis.filter(d=>d.statut==="a_faire").length} onClick={()=>onNavigate("devis")}/>
      <Stat icon="building" label="Chantiers actifs" value={chantiersActifs.length} onClick={()=>onNavigate("chantiers")}/>
      <Stat icon="receipt" label="Factures impayées" value={data.factures.filter(f=>f.statut==="impayee").length} onClick={()=>onNavigate("factures")}/>
    </div>

    <div style={{fontWeight:700,fontSize:15,color:COLORS.ink,marginBottom:10,fontFamily:FONT_DISPLAY}}>Activités récentes</div>
    <div style={{background:"#fff",border:`1px solid ${COLORS.line}`,borderRadius:14,overflow:"hidden"}}>
      {activites.length===0&&<div style={{padding:20,textAlign:"center",color:COLORS.inkSoft,fontSize:13}}>Aucune activité pour aujourd'hui</div>}
      {activites.map((a,i)=><div key={a.key} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderBottom:i<activites.length-1?`1px solid ${COLORS.lineSoft}`:"none"}}>
        <div style={{width:34,height:34,borderRadius:10,background:a.color+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name={a.icon} size={16} color={a.color}/></div>
        <div style={{minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13.5,color:COLORS.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.titre}</div>
          <div style={{fontSize:11.5,color:COLORS.inkSoft,fontFamily:FONT_MONO}}>{a.sous}</div>
        </div>
      </div>)}
    </div>
  </div>;
}

// ── CLIENTS ───────────────────────────────────────────────────────────────────
function Clients({data,api}){
  const [showForm,setShowForm]=useState(false);
  const [sel,setSel]=useState(null);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({nom:"",entreprise:"",email:"",tel:"",adresse:"",notes:""});
  const [editForm,setEditForm]=useState({nom:"",entreprise:"",email:"",tel:"",adresse:"",notes:""});
  const add=()=>{if(!form.nom.trim())return;api.ajouterItem("clients",{...form});setForm({nom:"",entreprise:"",email:"",tel:"",adresse:"",notes:""});setShowForm(false);};
  const del=(id)=>{api.supprimerItem("clients",id);setSel(null);};
  const openEdit=(c)=>{setEditForm({nom:c.nom||"",entreprise:c.entreprise||"",email:c.email||"",tel:c.tel||"",adresse:c.adresse||"",notes:c.notes||""});setEditing(c);};
  const saveEdit=()=>{if(!editForm.nom.trim())return;api.modifierItem("clients",editing.id,editForm);setEditing(null);};
  return <div style={{fontFamily:FONT_BODY}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><span style={{fontWeight:700,fontSize:19,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>Clients</span><span style={{marginLeft:10,background:COLORS.blueprintBg,color:COLORS.blueprint,borderRadius:20,padding:"2px 12px",fontSize:12.5,fontWeight:600}}>{(data.clients||[]).length}</span></div>
      <button style={btnP} onClick={()=>setShowForm(true)}><Icon name="plus" size={13} style={{marginRight:5,verticalAlign:-2}}/>Nouveau client</button>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {(data.clients||[]).map(c=>{
        const facturesClient=(data.factures||[]).filter(f=>f.client===c.nom);
        const devisClient=(data.devis||[]).filter(d=>d.client===c.nom);
        const chantiersClient=(data.chantiers||[]).filter(ch=>ch.client===c.nom);
        const ca=facturesClient.filter(f=>f.statut==="payee").reduce((s,f)=>s+calcTotaux(f.lignes,f.tauxTva).ttc,0);
        return <div key={c.id} style={{background:"#fff",border:`1px solid ${COLORS.line}`,borderRadius:14,padding:15,cursor:"pointer"}} onClick={()=>setSel(sel&&sel.id===c.id?null:c)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:COLORS.ink}}>{c.nom}</div>
              {c.entreprise&&<div style={{fontSize:12.5,color:COLORS.inkSoft,marginTop:1}}>{c.entreprise}</div>}
              <div style={{display:"flex",gap:14,marginTop:6,flexWrap:"wrap"}}>
                {c.tel&&<span style={{fontSize:12.5,color:COLORS.inkSoft,fontFamily:FONT_MONO}}>{c.tel}</span>}
                {c.email&&<span style={{fontSize:12.5,color:COLORS.inkSoft}}>{c.email}</span>}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,color:COLORS.success,fontSize:14.5,fontFamily:FONT_MONO}}>{Number(ca).toLocaleString("fr-FR",{maximumFractionDigits:0})} €</div>
              <div style={{fontSize:11,color:COLORS.inkSoft,marginTop:2}}>{chantiersClient.length} chantier(s)</div>
            </div>
          </div>
          {sel&&sel.id===c.id&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${COLORS.line}`}}>
            {c.adresse&&<div style={{fontSize:12.5,color:COLORS.inkSoft,marginBottom:8}}>{c.adresse}</div>}
            {c.notes&&<div style={{fontSize:12.5,color:COLORS.ink,padding:"8px 12px",background:COLORS.lineSoft,borderRadius:8,marginBottom:10}}>{c.notes}</div>}

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
              <div style={{background:COLORS.blueprintBg,borderRadius:10,padding:"9px 8px",textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:COLORS.blueprint,fontFamily:FONT_MONO}}>{devisClient.length}</div><div style={{fontSize:10,color:COLORS.inkSoft}}>Devis</div></div>
              <div style={{background:COLORS.successBg,borderRadius:10,padding:"9px 8px",textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:COLORS.success,fontFamily:FONT_MONO}}>{facturesClient.length}</div><div style={{fontSize:10,color:COLORS.inkSoft}}>Factures</div></div>
              <div style={{background:COLORS.violetBg,borderRadius:10,padding:"9px 8px",textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:COLORS.violet,fontFamily:FONT_MONO}}>{chantiersClient.length}</div><div style={{fontSize:10,color:COLORS.inkSoft}}>Chantiers</div></div>
            </div>

            {chantiersClient.length>0&&<div style={{marginBottom:10}}>
              <div style={{fontSize:10.5,fontWeight:700,color:COLORS.inkSoft,textTransform:"uppercase",letterSpacing:0.4,marginBottom:6}}>Chantiers</div>
              {chantiersClient.map(ch=><div key={ch.id} style={{fontSize:12.5,color:COLORS.ink,padding:"6px 0",borderBottom:`1px solid ${COLORS.lineSoft}`}}>{ch.nom}</div>)}
            </div>}

            <div style={{display:"flex",gap:8}}>
              <button onClick={(e)=>{e.stopPropagation();openEdit(c);}} style={btnS}>Modifier</button>
              <button onClick={(e)=>{e.stopPropagation();if(window.confirm("Supprimer ce client ?"))del(c.id);}} style={btnD}>Supprimer</button>
            </div>
          </div>}
        </div>;
      })}
      {(data.clients||[]).length===0&&<div style={{textAlign:"center",color:COLORS.inkSoft,padding:36,fontSize:13.5}}>Aucun client enregistré</div>}
    </div>
    {showForm&&<Modal title="Nouveau client" onClose={()=>setShowForm(false)}>
      <IR label="Nom *"><input style={inp} value={form.nom} onChange={e=>setForm(f=>({...f,nom:e.target.value}))} placeholder="M. Dupont"/></IR>
      <IR label="Société"><input style={inp} value={form.entreprise} onChange={e=>setForm(f=>({...f,entreprise:e.target.value}))} placeholder="SCI, SARL…"/></IR>

  const del=(id)=>api.supprimerItem("temps",id);
  const total=(data.temps||[]).reduce((s,t)=>s+(+t.heures||0),0);
  const parC={};(data.temps||[]).forEach(t=>{parC[t.chantier]=(parC[t.chantier]||0)+(+t.heures||0);});
  const tries=[...(data.temps||[])].sort((a,b)=>b.date.localeCompare(a.date));

        <div style={{fontSize:19,fontWeight:800,color:COLORS.blueprint,fontFamily:FONT_MONO}}>{h}h</div>
        <div style={{fontSize:11.5,color:COLORS.inkSoft,marginTop:2,fontWeight:600}}>{nom.split("–")[0].trim()}</div>

        <div style={{background:COLORS.blueprintBg,borderRadius:10,padding:"9px 12px",textAlign:"center",minWidth:52,flexShrink:0}}><div style={{fontWeight:800,fontSize:16,color:COLORS.blueprint,fontFamily:FONT_MONO}}>{t.heures}h</div></div>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,color:COLORS.ink,fontSize:13.5}}>{t.chantier}</div>
          {t.description&&<div style={{fontSize:12.5,color:COLORS.inkSoft}}>{t.description}</div>}
          <div style={{fontSize:11,color:COLORS.inkSoft,fontFamily:FONT_MONO}}>{t.date}{t.ouvrier?" · "+t.ouvrier:""}</div>
        </div>
        <button onClick={()=>del(t.id)} style={btnD}>×</button>
      </div>)}
      {tries.length===0&&<div style={{textAlign:"center",color:COLORS.inkSoft,padding:36,fontSize:13.5}}>Aucune heure saisie</div>}
    </div>
    {showForm&&<Modal title="Saisir des heures" onClose={()=>setShowForm(false)}>
      <IR label="Chantier *"><select style={inp} value={form.chantier} onChange={e=>setForm(f=>({...f,chantier:e.target.value}))}><option value="">— Choisir —</option>{data.chantiers.map(c=><option key={c.id} value={c.nom}>{c.nom}</option>)}</select></IR>
      <div style={{display:"flex",gap:10}}>
        <IR label="Date"><input type="date" style={inp} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></IR>
        <IR label="Heures"><input type="number" min="0.5" max="24" step="0.5" style={inp} value={form.heures} onChange={e=>setForm(f=>({...f,heures:e.target.value}))}/></IR>
      </div>
      <IR label="Description"><input style={inp} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Ex : Pose carrelage"/></IR>
      <IR label="Ouvrier / Équipe"><input style={inp} value={form.ouvrier} onChange={e=>setForm(f=>({...f,ouvrier:e.target.value}))} placeholder="Ex : Équipe 1"/></IR>
      <div style={{display:"flex",gap:10}}><button style={btnP} onClick={add}>Ajouter</button><button style={btnS} onClick={()=>setShowForm(false)}>Annuler</button></div>
    </Modal>}

}

// ── PARAMÈTRES ────────────────────────────────────────────────────────────────
function Parametres({data,api}){
  const [form,setForm]=useState(data.entreprise||{nom:"",siret:"",adresse:"",cp:"",ville:"",tel:"",email:"",tva:""});
  const [saved,setSaved]=useState(false);
  const [syncCal,setSyncCal]=useState(isCalendarSyncEnabled());
  const [calBusy,setCalBusy]=useState(false);
  const save=()=>{api.sauverEntreprise(form);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const toggleSyncCal=async()=>{
    if (!CalendarPlugin) { alert("La synchronisation avec l'agenda du téléphone n'est disponible que dans l'application mobile installée (pas sur le web)."); return; }
    if (syncCal) { localStorage.setItem(CALENDAR_SYNC_KEY,"0"); setSyncCal(false); return; }
    setCalBusy(true);
    try {
      const res = await CalendarPlugin.requestFullCalendarAccess();
      if (res && res.result === "granted") { localStorage.setItem(CALENDAR_SYNC_KEY,"1"); setSyncCal(true); }
      else { alert("Accès à l'agenda refusé. Active-le dans les réglages du téléphone si tu changes d'avis."); }
    } catch (e) { alert("Impossible d'accéder à l'agenda du téléphone."); }
    setCalBusy(false);
  };
  return <div style={{fontFamily:FONT_BODY}}>
    <div style={{display:"flex",alignItems:"center",gap:8,fontWeight:700,fontSize:19,color:COLORS.ink,marginBottom:16,fontFamily:FONT_DISPLAY}}><Icon name="settings" size={18} color={COLORS.ink}/>Paramètres entreprise</div>
    <div style={{background:"#fff",border:`1px solid ${COLORS.line}`,borderRadius:14,padding:18,marginBottom:14}}>
      <div style={{fontWeight:500,color:COLORS.inkSoft,fontSize:12.5,marginBottom:16}}>Ces informations apparaissent sur vos devis et factures</div>
      {[["Nom de l'entreprise","nom"],["SIRET","siret"],["N° TVA","tva"],["Adresse","adresse"],["Code postal","cp"],["Ville","ville"],["Téléphone","tel"],["Email","email"]].map(([label,key])=><IR key={key} label={label}><input style={inp} value={form[key]||""} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}/></IR>)}
      <div style={{display:"flex",gap:10,marginTop:4}}>
        <button style={{...btnP,background:saved?COLORS.success:COLORS.accent}} onClick={save}>{saved?"Enregistré !":"Enregistrer"}</button>
        <button style={btnD} onClick={()=>{if(window.confirm("Remettre toutes les données à zéro ?")){localStorage.removeItem("gestchantier_data");window.location.reload();}}}>Réinitialiser</button>
      </div>
    </div>
    <div style={{background:"#fff",border:`1px solid ${COLORS.line}`,borderRadius:14,padding:18,marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,fontWeight:700,fontSize:14,color:COLORS.ink,marginBottom:6}}><Icon name="calendar" size={16} color={COLORS.ink}/>Agenda du téléphone</div>
      <div style={{fontSize:12.5,color:COLORS.inkSoft,marginBottom:14,lineHeight:1.5}}>Ajoute automatiquement tes rendez-vous Gest'Chantier dans l'agenda natif de ton téléphone.</div>
      <label style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:calBusy?"default":"pointer"}}>
        <span style={{fontSize:13.5,fontWeight:600,color:COLORS.ink}}>Synchroniser mes rendez-vous</span>
        <span onClick={calBusy?undefined:toggleSyncCal} style={{width:44,height:26,borderRadius:20,background:syncCal?COLORS.accent:COLORS.line,position:"relative",transition:"background 0.15s",flexShrink:0,opacity:calBusy?0.6:1}}>
          <span style={{position:"absolute",top:3,left:syncCal?21:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}/>
        </span>
      </label>
    </div>
    <div style={{background:COLORS.pendingBg,border:`1px solid ${COLORS.pending}30`,borderRadius:14,padding:15}}>
      <div style={{fontWeight:700,color:COLORS.pending,marginBottom:7,fontSize:13.5}}>Facturation électronique obligatoire (sept. 2026)</div>
      <div style={{fontSize:12.5,color:COLORS.ink,lineHeight:1.6}}>À partir de septembre 2026, toutes les factures B2B doivent être émises en format électronique. Assurez-vous que votre SIRET et N° TVA sont bien renseignés.</div>
    </div>
  </div>;
}

// HELPERS ABONNEMENT (appels aux Edge Functions Supabase)

const appelerFonction = async (nom, body) => {
  if (!supabaseClient) return null;
  const { data: session } = await supabaseClient.auth.getSession();
  const token = session?.session?.access_token;
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${nom}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      "apikey": SUPABASE_KEY,
    },
    body: JSON.stringify(body),
  });
  return res.json();
};

// ── BIOMÉTRIE (Face ID / Touch ID / empreinte Android) ────────────────────────
// Accès direct au plugin natif via le pont Capacitor, sans import npm (pas de bundler ici).
const Biometric = (typeof window !== "undefined" && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.NativeBiometric) || null;
const BIOMETRIC_SERVER = "gestchantier.app";
const REMEMBER_KEY = "gc_remember_email";
const BIOMETRIC_ENABLED_KEY = "gc_biometric_enabled";

// ── AGENDA NATIF (synchronisation calendrier téléphone) ────────────────────────
const CalendarPlugin = (typeof window !== "undefined" && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.CapacitorCalendar) || null;
const CALENDAR_SYNC_KEY = "gc_sync_calendar";
const isCalendarSyncEnabled = () => localStorage.getItem(CALENDAR_SYNC_KEY) === "1";

function Login({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const [remember, setRemember] = useState(false);
  const [bioAvailable, setBioAvailable] = useState(false);
  const [bioEnabled, setBioEnabled] = useState(false);

  useEffect(() => {
    const saved = localStorage.getItem(REMEMBER_KEY);
    if (saved) { setEmail(saved); setRemember(true); }
    setBioEnabled(localStorage.getItem(BIOMETRIC_ENABLED_KEY) === "1");
    if (Biometric) {
      Biometric.isAvailable().then(r => setBioAvailable(!!(r && r.isAvailable))).catch(() => setBioAvailable(false));
    }
  }, []);

  const s2 = {width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${COLORS.line}`,fontSize:15,color:COLORS.ink,boxSizing:"border-box",outline:"none",marginBottom:12,fontFamily:FONT_BODY};

  const proposerBiometrie = async (loggedEmail, loggedPassword) => {
    if (!Biometric || !bioAvailable || bioEnabled) return;
    const ok = window.confirm("Activer la connexion par Face ID / empreinte pour la prochaine fois ?");
    if (!ok) return;
    try {
      await Biometric.setCredentials({ username: loggedEmail, password: loggedPassword, server: BIOMETRIC_SERVER });
      localStorage.setItem(BIOMETRIC_ENABLED_KEY, "1");
      setBioEnabled(true);
    } catch (e) { /* annulé ou non supporté, on ignore silencieusement */ }
  };

  const handleAuth = async () => {
    if (mode === "reset") {
      if (!email) { setMessage("Indique ton email"); return; }
      if (!supabaseClient) { setMessage("Configuration Supabase manquante"); return; }
      setLoading(true);
      setMessage("");
      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + window.location.pathname,
        });
        if (error) throw error;
        setMessage("OK Email envoyé ! Vérifie ta boîte mail pour réinitialiser ton mot de passe.");
      } catch (e) {
        setMessage("Erreur : " + (e.message || "Erreur"));
      }
      setLoading(false);
      return;
    }

    if (!email || !password) { setMessage("Remplis tous les champs"); return; }
    if (!supabaseClient) { setMessage("Configuration Supabase manquante"); return; }
    setLoading(true);
    setMessage("");
    try {
      if (mode === "signup") {
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) throw error;
        setMessage("OK Compte créé ! Vérifie ta boîte email pour confirmer ton inscription.");
      } else {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        if (remember) localStorage.setItem(REMEMBER_KEY, email); else localStorage.removeItem(REMEMBER_KEY);
        await proposerBiometrie(email, password);
        onLogin(data.user);
      }
    } catch (e) {
      const msg = e.message || "Erreur";
      if (msg.includes("Invalid login")) setMessage("Erreur : email ou mot de passe incorrect");
      else if (msg.includes("already registered")) setMessage("Erreur : cet email est déjà inscrit");
      else if (msg.includes("Email not confirmed")) setMessage("Confirme d'abord ton email (vérifie ta boîte)");
      else setMessage("Erreur : " + msg);
    }
    setLoading(false);
  };

  const loginBiometrique = async () => {
    if (!Biometric) return;
    setLoading(true);
    setMessage("");
    try {
      await Biometric.verifyIdentity({ reason: "Connexion à Gest'Chantier", title: "Authentification", subtitle: "", description: "" });
      const creds = await Biometric.getCredentials({ server: BIOMETRIC_SERVER });
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email: creds.username, password: creds.password });
      if (error) throw error;
      onLogin(data.user);
    } catch (e) {
      setMessage("Erreur : authentification biométrique annulée ou échouée");
    }
    setLoading(false);
  };

  const isOk = message.startsWith("OK");

  return (
    <div style={{height:"100vh",overflowY:"auto",background:COLORS.ink,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT_BODY,padding:20,paddingTop:"calc(20px + env(safe-area-inset-top))",paddingBottom:"calc(20px + env(safe-area-inset-bottom))"}}>
      <div style={{background:"#fff",borderRadius:20,padding:36,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <img src={LOGO_URI} style={{width:88,height:88,borderRadius:22,margin:"0 auto 14px",display:"block",objectFit:"cover"}}/>
          <div style={{fontWeight:700,fontSize:26,color:COLORS.ink,fontFamily:FONT_DISPLAY}}><span style={{color:COLORS.accent}}>Gest'</span>Chantier</div>
        </div>

        {mode === "login" && bioAvailable && bioEnabled && <>
          <button onClick={loginBiometrique} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px solid ${COLORS.ink}`,background:"#fff",color:COLORS.ink,fontWeight:700,fontSize:14,cursor:loading?"default":"pointer",fontFamily:FONT_BODY,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Icon name="check" size={16} color={COLORS.ink}/>Se connecter avec Face ID
          </button>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style={{flex:1,height:1,background:COLORS.line}}/>
            <span style={{fontSize:11,color:COLORS.inkSoft,textTransform:"uppercase",letterSpacing:0.4}}>ou</span>
            <div style={{flex:1,height:1,background:COLORS.line}}/>
          </div>
        </>}

        {mode !== "reset" && <div style={{display:"flex",gap:8,marginBottom:24,background:COLORS.lineSoft,borderRadius:10,padding:4}}>
          <button onClick={()=>{setMode("login");setMessage("");}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:mode==="login"?COLORS.ink:"transparent",color:mode==="login"?"#fff":COLORS.inkSoft,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:FONT_BODY}}>Connexion</button>
          <button onClick={()=>{setMode("signup");setMessage("");}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:mode==="signup"?COLORS.ink:"transparent",color:mode==="signup"?"#fff":COLORS.inkSoft,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:FONT_BODY}}>Inscription</button>
        </div>}

        {mode === "reset" && <div style={{textAlign:"center",fontSize:13,color:COLORS.inkSoft,marginBottom:20,lineHeight:1.5}}>
          Indique ton email, on t'envoie un lien pour créer un nouveau mot de passe.
        </div>}

        <label style={{display:"block",fontSize:11.5,fontWeight:700,color:COLORS.inkSoft,marginBottom:4,textTransform:"uppercase"}}>Email</label>
        <input style={s2} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="vous@entreprise.fr"/>

        {mode !== "reset" && <>
          <label style={{display:"block",fontSize:11.5,fontWeight:700,color:COLORS.inkSoft,marginBottom:4,textTransform:"uppercase"}}>Mot de passe</label>
          <input style={s2} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handleAuth()}/>
        </>}

        {mode === "login" && <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,cursor:"pointer",fontSize:13,color:COLORS.inkSoft}}>
          <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)} style={{width:16,height:16,cursor:"pointer",accentColor:COLORS.accent}}/>
          Se souvenir de mon identifiant
        </label>}

        {message && <div style={{padding:"10px 14px",borderRadius:8,background:isOk?COLORS.successBg:COLORS.dangerBg,color:isOk?COLORS.success:COLORS.danger,fontSize:13,marginBottom:12,lineHeight:1.5}}>{message.replace(/^OK /,"")}</div>}

        <button onClick={handleAuth} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:loading?COLORS.inkSoft:COLORS.accent,color:"#fff",fontWeight:700,fontSize:15,cursor:loading?"default":"pointer",fontFamily:FONT_BODY}}>
          {loading ? "Chargement..." : (mode==="login" ? "Se connecter" : mode==="signup" ? "Créer mon compte" : "Envoyer le lien")}
        </button>

        {mode === "login" && <div style={{textAlign:"center",marginTop:14}}>
          <button onClick={()=>{setMode("reset");setMessage("");}} style={{background:"none",border:"none",color:COLORS.blueprint,fontSize:13,fontWeight:600,cursor:"pointer"}}>Mot de passe oublié ?</button>
        </div>}

        {mode === "reset" && <div style={{textAlign:"center",marginTop:14}}>
          <button onClick={()=>{setMode("login");setMessage("");}} style={{background:"none",border:"none",color:COLORS.inkSoft,fontSize:13,fontWeight:600,cursor:"pointer"}}>← Retour à la connexion</button>
        </div>}

        {mode==="signup" && <div style={{textAlign:"center",fontSize:12,color:COLORS.inkSoft,marginTop:16,lineHeight:1.5}}>
          14 jours d'essai gratuit<br/>Aucune carte bancaire requise
        </div>}
      </div>
    </div>
  );
}

// Tables synchronisées avec Supabase
const TABLES = ["clients","chantiers","devis","factures","rdv","taches","temps"];

const versDB = (item, table) => {
  const o = {...item};
  delete o.id;
  if (o.dateEmission !== undefined) { o.date_emission = o.dateEmission || null; delete o.dateEmission; }
  if (o.dateEcheance !== undefined) { o.date_echeance = o.dateEcheance || null; delete o.dateEcheance; }
  if (o.adresseClient !== undefined) { o.adresse_client = o.adresseClient; delete o.adresseClient; }
  if (o.tauxTva !== undefined) { o.taux_tva = o.tauxTva; delete o.tauxTva; }
  ["echeance","debut","fin","date"].forEach(k => { if (o[k] === "") o[k] = null; });
  return o;
};
const depuisDB = (row) => {
  const o = {...row};
  if (o.date_emission !== undefined) { o.dateEmission = o.date_emission; delete o.date_emission; }
  if (o.date_echeance !== undefined) { o.dateEcheance = o.date_echeance; delete o.date_echeance; }
  if (o.adresse_client !== undefined) { o.adresseClient = o.adresse_client; delete o.adresse_client; }
  if (o.taux_tva !== undefined) { o.tauxTva = o.taux_tva; delete o.taux_tva; }
  return o;
};

function MainApp({ session, onLogout }){

    clients:[], chantiers:[], devis:[], factures:[], rdv:[], taches:[], temps:[],
    entreprise:{nom:"",siret:"",adresse:"",cp:"",ville:"",tel:"",email:"",tva:""},
  });
  const [chargement, setChargement] = useState(true);

  useEffect(() => {
    const charger = async () => {
      if (!supabaseClient) { setChargement(false); return; }
      const nouvelles = {};
      for (const table of TABLES) {
        const { data: rows, error } = await supabaseClient.from(table).select("*").order("created_at",{ascending:true});
        nouvelles[table] = error ? [] : (rows||[]).map(depuisDB);
      }
      const { data: prof } = await supabaseClient.from("profils").select("*").eq("id", session.user.id).maybeSingle();
      nouvelles.entreprise = prof || {nom:"",siret:"",adresse:"",cp:"",ville:"",tel:"",email:session.user.email,tva:""};
      setData(d => ({...d, ...nouvelles}));
      setChargement(false);
    };
    charger();
  }, []);

  const ajouterItem = async (table, item) => {
    if (!supabaseClient) return null;
    const payload = {...versDB(item, table), user_id: session.user.id};
    const { data: row, error } = await supabaseClient.from(table).insert(payload).select().single();
    if (!error && row) { const clean = depuisDB(row); setData(d => ({...d, [table]: [...d[table], clean]})); return clean; }
    else if (error) { alert("Erreur : " + error.message); return null; }
  };
  const supprimerItem = async (table, id) => {
    if (!supabaseClient) return;
    await supabaseClient.from(table).delete().eq("id", id);
    setData(d => ({...d, [table]: d[table].filter(x => x.id !== id)}));
  };
  const modifierItem = async (table, id, champs) => {
    if (!supabaseClient) return;
    await supabaseClient.from(table).update(versDB({...champs}, table)).eq("id", id);
    setData(d => ({...d, [table]: d[table].map(x => x.id === id ? {...x, ...champs} : x)}));

  const sauverEntreprise = async (entreprise) => {

// WRAPPER AVEC AUTHENTIFICATION
// ═══════════════════════════════════════════════════════════════
function NewPassword({ onDone }) {
  const [password, setPassword] = useState("");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const s2 = {width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${COLORS.line}`,fontSize:15,color:COLORS.ink,boxSizing:"border-box",outline:"none",marginBottom:12,fontFamily:FONT_BODY};

  const valider = async () => {
    if (!password || password.length < 6) { setMessage("Erreur : 6 caractères minimum"); return; }
    setLoading(true);
    try {
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) throw error;
      setMessage("OK Mot de passe mis à jour !");
      setTimeout(onDone, 1200);
    } catch (e) {
      setMessage("Erreur : " + (e.message || "Erreur"));
    }
    setLoading(false);
  };
  const isOk = message.startsWith("OK");

  return (
    <div style={{height:"100vh",overflowY:"auto",background:COLORS.ink,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT_BODY,padding:20,paddingTop:"calc(20px + env(safe-area-inset-top))",paddingBottom:"calc(20px + env(safe-area-inset-bottom))"}}>
      <div style={{background:"#fff",borderRadius:20,padding:36,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <img src={LOGO_URI} style={{width:52,height:52,borderRadius:16,margin:"0 auto 12px",display:"block",objectFit:"cover"}}/>
          <div style={{fontWeight:700,fontSize:20,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>Nouveau mot de passe</div>
        </div>
        <label style={{display:"block",fontSize:11.5,fontWeight:700,color:COLORS.inkSoft,marginBottom:4,textTransform:"uppercase"}}>Nouveau mot de passe</label>
        <input style={s2} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&valider()}/>
        {message && <div style={{padding:"10px 14px",borderRadius:8,background:isOk?COLORS.successBg:COLORS.dangerBg,color:isOk?COLORS.success:COLORS.danger,fontSize:13,marginBottom:12,lineHeight:1.5}}>{message.replace(/^OK /,"")}</div>}
        <button onClick={valider} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:loading?COLORS.inkSoft:COLORS.accent,color:"#fff",fontWeight:700,fontSize:15,cursor:loading?"default":"pointer",fontFamily:FONT_BODY}}>
          {loading ? "Chargement..." : "Valider le nouveau mot de passe"}
        </button>
      </div>
    </div>
  );
}

function App(){
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [statutAbo, setStatutAbo] = useState(null);
  const [checkingAbo, setCheckingAbo] = useState(false);
  const [modeRecovery, setModeRecovery] = useState(false);

  useEffect(() => {
    if (!supabaseClient) { setLoading(false); return; }
    supabaseClient.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setLoading(false);
    });
    const { data: listener } = supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY") setModeRecovery(true);
      setSession(session);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  const verifierAbonnement = async (currentSession) => {
    if (!currentSession?.user?.id) return;
    setCheckingAbo(true);
    try {
      const result = await appelerFonction("check-subscription", { userId: currentSession.user.id });
      setStatutAbo(result?.status || "no_subscription");
    } catch (e) {
      setStatutAbo("no_subscription");
    }
    setCheckingAbo(false);
  };

  useEffect(() => {
    if (session?.user?.id) verifierAbonnement(session);
  }, [session?.user?.id]);

  const handleLogout = async () => {
    if (supabaseClient) await supabaseClient.auth.signOut();
    setSession(null);
    setStatutAbo(null);
  };

  if (loading) {
    return <div style={{height:"100vh",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",background:COLORS.ink,color:"#fff",fontFamily:FONT_BODY}}>
      <div style={{textAlign:"center"}}>
        <img src={LOGO_URI} style={{width:56,height:56,borderRadius:14,marginBottom:12}}/>
        <div>Chargement de Gest'Chantier...</div>
      </div>
    </div>;
  }

  if (modeRecovery) {
    return <NewPassword onDone={() => { setModeRecovery(false); window.location.href = window.location.origin + window.location.pathname; }} />;
  }

  if (!session) {
    return <Login onLogin={(user) => setSession({ user })} />;
  }

  if (checkingAbo || statutAbo === null) {
    return <div style={{height:"100vh",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",background:COLORS.ink,color:"#fff",fontFamily:FONT_BODY}}>
      <div style={{textAlign:"center"}}>
        <Icon name="card" size={32} color="#fff" style={{marginBottom:12}}/>
        <div>Vérification de l'abonnement...</div>
      </div>
    </div>;
  }

  const actif = ["trialing","active"].includes(statutAbo);
  if (!actif) {
    return <PageAbonnement session={session} statut={statutAbo} onRefresh={() => verifierAbonnement(session)} onLogout={handleLogout} />;
  }

  return <MainApp session={session} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
