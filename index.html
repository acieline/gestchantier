// ── LIGNES EDITOR ─────────────────────────────────────────────────────────────
function LignesEditor({lignes,setLignes}){
  const add=()=>setLignes([...lignes,{desc:"",qte:1,pu:0}]);
  const upd=(i,f,v)=>{const l=[...lignes];l[i]={...l[i],[f]:v};setLignes(l);};
  const del=(i)=>setLignes(lignes.filter((_,idx)=>idx!==i));
  const {ht,tva,ttc}=calcTotaux(lignes);
  return <div>
    <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8}}>PRESTATIONS</div>
    {lignes.map((l,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
      <input style={{...inp,flex:3}} placeholder="Description" value={l.desc} onChange={e=>upd(i,"desc",e.target.value)}/>
      <input style={{...inp,width:60,flex:"none"}} type="number" placeholder="Qté" value={l.qte} onChange={e=>upd(i,"qte",e.target.value)}/>
      <input style={{...inp,width:80,flex:"none"}} type="number" placeholder="P.U.€" value={l.pu} onChange={e=>upd(i,"pu",e.target.value)}/>
      <span style={{fontSize:13,fontWeight:700,color:"#1e40af",minWidth:70,textAlign:"right"}}>{((Number(l.qte)||0)*(Number(l.pu)||0)).toLocaleString("fr-FR")} €</span>
      <button onClick={()=>del(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:18}}>×</button>
    </div>)}
    <button onClick={add} style={{...btnS,fontSize:13,marginBottom:12}}>+ Ligne</button>
    <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#64748b",marginBottom:3}}><span>HT</span><span style={{fontWeight:600}}>{ht.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#64748b",marginBottom:3}}><span>TVA 20%</span><span style={{fontWeight:600}}>{tva.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:800,color:"#1e40af",borderTop:"2px solid #1e40af",paddingTop:8,marginTop:4}}><span>TTC</span><span>{ttc.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>
    </div>
  </div>;
}

function Agenda({data,api}){
  const [showForm,setShowForm]=useState(false);
  const [vue,setVue]=useState("liste");
  const [moisActuel,setMoisActuel]=useState(new Date());
  const [form,setForm]=useState({titre:"",client:"",date:TODAY,heure:"09:00",duree:60,type:"chantier",notes:""});
  const add=()=>{if(!form.titre.trim())return;api.ajouterItem("rdv",{...form,duree:Number(form.duree)});setForm({titre:"",client:"",date:TODAY,heure:"09:00",duree:60,type:"chantier",notes:""});setShowForm(false);};
  const del=(id)=>api.supprimerItem("rdv",id);
  const rdvTries=[...data.rdv].sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));

    {apercu&&<ApercuDoc doc={apercu.doc} type={apercu.type} entreprise={data.entreprise} onClose={()=>setApercu(null)}/>}

}

      <div style={{fontWeight:700,fontSize:14,color:"#1e293b",marginBottom:12}}>🏗️ Avancement chantiers</div>

// TEMPS
function Temps({data,api}){
  const [showForm,setShowForm]=useState(false);

  const s2={width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:14,color:"#1e293b",boxSizing:"border-box",outline:"none"};

  const del=(id)=>api.supprimerItem("temps",id);
  const total=(data.temps||[]).reduce((s,t)=>s+(+t.heures||0),0);
  const parC={};(data.temps||[]).forEach(t=>{parC[t.chantier]=(parC[t.chantier]||0)+(+t.heures||0);});
  const tries=[...(data.temps||[])].sort((a,b)=>b.date.localeCompare(a.date));
  return <div>

    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:20}}>
      {Object.entries(parC).map(([nom,h])=><div key={nom} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:"12px 14px"}}>

      </div>)}

    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {tries.map(t=><div key={t.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{background:"#eff6ff",borderRadius:10,padding:"10px 14px",textAlign:"center",minWidth:52,flexShrink:0}}><div style={{fontWeight:800,fontSize:18,color:"#1e40af"}}>{t.heures}h</div></div>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,color:"#1e293b",fontSize:14}}>{t.chantier}</div>
          {t.description&&<div style={{fontSize:13,color:"#64748b"}}>{t.description}</div>}
          <div style={{fontSize:12,color:"#94a3b8"}}>📅 {t.date}{t.ouvrier?" · 👷 "+t.ouvrier:""}</div>
        </div>
        <button onClick={()=>del(t.id)} style={{background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:600,fontSize:12,cursor:"pointer"}}>×</button>
      </div>)}
      {tries.length===0&&<div style={{textAlign:"center",color:"#94a3b8",padding:40}}>⏱️ Aucune heure saisie</div>}
    </div>
    {showForm&&<Modal title="Saisir des heures" onClose={()=>setShowForm(false)}>
      <div style={{marginBottom:12}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#64748b",marginBottom:4}}>Chantier *</label><select style={s2} value={form.chantier} onChange={e=>setForm(f=>({...f,chantier:e.target.value}))}><option value="">— Choisir —</option>{data.chantiers.map(c=><option key={c.id} value={c.nom}>{c.nom}</option>)}</select></div>
      <div style={{display:"flex",gap:10}}>
        <div style={{marginBottom:12,flex:1}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#64748b",marginBottom:4}}>Date</label><input type="date" style={s2} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>

      </div>
      <div style={{marginBottom:12}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#64748b",marginBottom:4}}>Description</label><input style={s2} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Ex : Pose carrelage"/></div>
      <div style={{marginBottom:12}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#64748b",marginBottom:4}}>Ouvrier / Équipe</label><input style={s2} value={form.ouvrier} onChange={e=>setForm(f=>({...f,ouvrier:e.target.value}))} placeholder="Ex : Équipe 1"/></div>
      <div style={{display:"flex",gap:10}}><button style={{background:"#1e40af",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontWeight:600,fontSize:13,cursor:"pointer"}} onClick={add}>Ajouter</button><button style={{background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:"9px 18px",fontWeight:600,fontSize:13,cursor:"pointer"}} onClick={()=>setShowForm(false)}>Annuler</button></div>
    </Modal>}

const appelerFonction = async (nom, body) => {
  if (!supabaseClient) return null;
  const { data: session } = await supabaseClient.auth.getSession();
  const token = session?.session?.access_token;
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${nom}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      "apikey": SUPABASE_KEY,
    },
    body: JSON.stringify(body),
  });
  return res.json();
};

function Login({ onLogin }) {
  const [mode, setMode] = useState("login"); // login | signup | reset
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [message, setMessage] = useState("");

  const s2 = {width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid #e2e8f0",fontSize:15,color:"#1e293b",boxSizing:"border-box",outline:"none",marginBottom:12};

  const handleAuth = async () => {
    if (mode === "reset") {
      if (!email) { setMessage("Indique ton email"); return; }
      if (!supabaseClient) { setMessage("⚠️ Configuration Supabase manquante"); return; }
      setLoading(true);
      setMessage("");
      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + window.location.pathname,
        });
        if (error) throw error;
        setMessage("✅ Email envoyé ! Vérifie ta boîte mail pour réinitialiser ton mot de passe.");
      } catch (e) {
        setMessage("❌ " + (e.message || "Erreur"));
      }
      setLoading(false);
      return;
    }

    if (!email || !password) { setMessage("Remplis tous les champs"); return; }
    if (!supabaseClient) { setMessage("⚠️ Configuration Supabase manquante"); return; }
    setLoading(true);
    setMessage("");
    try {
      if (mode === "signup") {
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) throw error;
        setMessage("✅ Compte créé ! Vérifie ta boîte email pour confirmer ton inscription.");
      } else {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        onLogin(data.user);
      }
    } catch (e) {
      const msg = e.message || "Erreur";
      if (msg.includes("Invalid login")) setMessage("❌ Email ou mot de passe incorrect");
      else if (msg.includes("already registered")) setMessage("❌ Cet email est déjà inscrit");
      else if (msg.includes("Email not confirmed")) setMessage("⚠️ Confirme d'abord ton email (vérifie ta boîte)");

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1e3a5f 0%,#1e40af 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Segoe UI',system-ui,sans-serif",padding:20}}>

          <button onClick={()=>{setMode("login");setMessage("");}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:mode==="login"?"#1e40af":"transparent",color:mode==="login"?"#fff":"#64748b",fontWeight:600,fontSize:14,cursor:"pointer"}}>Connexion</button>

// Tables synchronisées avec Supabase
const TABLES = ["clients","chantiers","devis","factures","rdv","taches","temps"];

const versDB = (item, table) => {
  const o = {...item};
  delete o.id;
  if (o.dateEmission !== undefined) { o.date_emission = o.dateEmission || null; delete o.dateEmission; }
  if (o.dateEcheance !== undefined) { o.date_echeance = o.dateEcheance || null; delete o.dateEcheance; }
  if (o.adresseClient !== undefined) { o.adresse_client = o.adresseClient; delete o.adresseClient; }
  ["echeance","debut","fin","date"].forEach(k => { if (o[k] === "") o[k] = null; });
  return o;
};
const depuisDB = (row) => {
  const o = {...row};
  if (o.date_emission !== undefined) { o.dateEmission = o.date_emission; delete o.date_emission; }
  if (o.date_echeance !== undefined) { o.dateEcheance = o.date_echeance; delete o.date_echeance; }
  if (o.adresse_client !== undefined) { o.adresseClient = o.adresse_client; delete o.adresse_client; }
  return o;
};

        nouvelles[table] = error ? [] : (rows||[]).map(depuisDB);

function NewPassword({ onDone }) {
  const [password, setPassword] = useState("");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const s2 = {width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid #e2e8f0",fontSize:15,color:"#1e293b",boxSizing:"border-box",outline:"none",marginBottom:12};

  const valider = async () => {
    if (!password || password.length < 6) { setMessage("❌ 6 caractères minimum"); return; }
    setLoading(true);
    try {
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) throw error;
      setMessage("✅ Mot de passe mis à jour !");
      setTimeout(onDone, 1200);
    } catch (e) {
      setMessage("❌ " + (e.message || "Erreur"));
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1e3a5f 0%,#1e40af 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Segoe UI',system-ui,sans-serif",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:36,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{background:"#f59e0b",borderRadius:16,width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>🔧</div>
          <div style={{fontWeight:800,fontSize:20,color:"#1e3a5f"}}>Nouveau mot de passe</div>
        </div>
        <label style={{display:"block",fontSize:12,fontWeight:700,color:"#64748b",marginBottom:4,textTransform:"uppercase"}}>Nouveau mot de passe</label>
        <input style={s2} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&valider()}/>
        {message && <div style={{padding:"10px 14px",borderRadius:8,background:message.startsWith("✅")?"#f0fdf4":"#fef2f2",color:message.startsWith("✅")?"#16a34a":"#ef4444",fontSize:13,marginBottom:12,lineHeight:1.5}}>{message}</div>}
        <button onClick={valider} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:loading?"#94a3b8":"#1e40af",color:"#fff",fontWeight:700,fontSize:15,cursor:loading?"default":"pointer"}}>
          {loading ? "Chargement..." : "Valider le nouveau mot de passe"}
        </button>
      </div>
    </div>
  );
}

function App(){
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [statutAbo, setStatutAbo] = useState(null); // null = pas encore vérifié
  const [checkingAbo, setCheckingAbo] = useState(false);
  const [modeRecovery, setModeRecovery] = useState(false);

  useEffect(() => {
    if (!supabaseClient) { setLoading(false); return; }
    supabaseClient.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setLoading(false);
    });
    const { data: listener } = supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY") setModeRecovery(true);
      setSession(session);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  const verifierAbonnement = async (currentSession) => {
    if (!currentSession?.user?.id) return;
    setCheckingAbo(true);
    try {
      const result = await appelerFonction("check-subscription", { userId: currentSession.user.id });
      setStatutAbo(result?.status || "no_subscription");
    } catch (e) {
      setStatutAbo("no_subscription");
    }
    setCheckingAbo(false);
  };

  useEffect(() => {
    if (session?.user?.id) verifierAbonnement(session);
  }, [session?.user?.id]);

  const handleLogout = async () => {
    if (supabaseClient) await supabaseClient.auth.signOut();
    setSession(null);
    setStatutAbo(null);
  };

  if (loading) {
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#1e3a5f",color:"#fff",fontFamily:"system-ui"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>🔧</div>
        <div>Chargement de Gest'Chantier...</div>
      </div>
    </div>;
  }

  if (modeRecovery) {
    return <NewPassword onDone={() => { setModeRecovery(false); window.location.href = window.location.origin + window.location.pathname; }} />;
  }

  if (!session) {
    return <Login onLogin={(user) => setSession({ user })} />;
  }

  if (checkingAbo || statutAbo === null) {
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#1e3a5f",color:"#fff",fontFamily:"system-ui"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>💳</div>
        <div>Vérification de l'abonnement...</div>
      </div>
    </div>;
  }

  const actif = ["trialing","active"].includes(statutAbo);
  if (!actif) {
    return <PageAbonnement session={session} statut={statutAbo} onRefresh={() => verifierAbonnement(session)} onLogout={handleLogout} />;
  }

  return <MainApp session={session} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
