function Badge({config,value}){
  const c=config[value]||{};
  return <span style={{display:"inline-flex",alignItems:"center",gap:6,fontFamily:FONT_MONO,fontSize:10.5,fontWeight:600,letterSpacing:0.3,textTransform:"uppercase",padding:"3px 10px 3px 8px",borderRadius:4,background:c.bg,color:c.color,borderBottom:`1.5px dashed ${c.color}`}}>

function Modal({title,onClose,children,wide}){
  return <div style={{position:"fixed",inset:0,background:"rgba(28,35,33,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:COLORS.surface,borderRadius:16,padding:26,width:"100%",maxWidth:wide?740:500,boxShadow:"0 8px 40px rgba(28,35,33,0.25)",maxHeight:"92vh",overflowY:"auto",fontFamily:FONT_BODY}}>

      </div>
      {children}

}

// ── LIGNES EDITOR ─────────────────────────────────────────────────────────────
function LignesEditor({lignes,setLignes}){
  const add=()=>setLignes([...lignes,{desc:"",qte:1,pu:0}]);
  const upd=(i,f,v)=>{const l=[...lignes];l[i]={...l[i],[f]:v};setLignes(l);};
  const del=(i)=>setLignes(lignes.filter((_,idx)=>idx!==i));
  const {ht,tva,ttc}=calcTotaux(lignes);
  return <div>
    <div style={{fontSize:11,fontWeight:700,color:COLORS.inkSoft,marginBottom:8,letterSpacing:0.4,textTransform:"uppercase"}}>Prestations</div>
    {lignes.map((l,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
      <input style={{...inp,flex:3}} placeholder="Description" value={l.desc} onChange={e=>upd(i,"desc",e.target.value)}/>
      <input style={{...inp,width:60,flex:"none"}} type="number" placeholder="Qté" value={l.qte} onChange={e=>upd(i,"qte",e.target.value)}/>
      <input style={{...inp,width:80,flex:"none"}} type="number" placeholder="P.U.€" value={l.pu} onChange={e=>upd(i,"pu",e.target.value)}/>
      <span style={{fontSize:13,fontWeight:700,color:COLORS.blueprint,minWidth:70,textAlign:"right",fontFamily:FONT_MONO}}>{((Number(l.qte)||0)*(Number(l.pu)||0)).toLocaleString("fr-FR")} €</span>
      <button onClick={()=>del(i)} style={{background:"none",border:"none",cursor:"pointer",color:COLORS.danger,fontSize:18}}>×</button>
    </div>)}
    <button onClick={add} style={{...btnS,marginBottom:12}}>+ Ligne</button>
    <div style={{background:COLORS.lineSoft,borderRadius:10,padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:COLORS.inkSoft,marginBottom:3}}><span>HT</span><span style={{fontWeight:600,fontFamily:FONT_MONO}}>{ht.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:COLORS.inkSoft,marginBottom:3}}><span>TVA 20%</span><span style={{fontWeight:600,fontFamily:FONT_MONO}}>{tva.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:800,color:COLORS.accent,borderTop:`2px solid ${COLORS.accent}`,paddingTop:8,marginTop:4,fontFamily:FONT_MONO}}><span>TTC</span><span>{ttc.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</span></div>
    </div>
  </div>;
}

// ── AGENDA ────────────────────────────────────────────────────────────────────
function Agenda({data,api}){
  const [showForm,setShowForm]=useState(false);
  const [vue,setVue]=useState("liste");
  const [moisActuel,setMoisActuel]=useState(new Date());
  const [form,setForm]=useState({titre:"",client:"",date:TODAY,heure:"09:00",duree:60,type:"chantier",notes:""});
  const add=()=>{if(!form.titre.trim())return;api.ajouterItem("rdv",{...form,duree:Number(form.duree)});setForm({titre:"",client:"",date:TODAY,heure:"09:00",duree:60,type:"chantier",notes:""});setShowForm(false);};
  const del=(id)=>api.supprimerItem("rdv",id);
  const rdvTries=[...data.rdv].sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  const rdvAvenir=rdvTries.filter(r=>r.date>=TODAY);
  const rdvPasses=rdvTries.filter(r=>r.date<TODAY);
  const annee=moisActuel.getFullYear(),mois=moisActuel.getMonth();
  const premierJour=new Date(annee,mois,1).getDay(),nbJours=new Date(annee,mois+1,0).getDate();
  const jours=[];for(let i=0;i<premierJour;i++)jours.push(null);for(let i=1;i<=nbJours;i++)jours.push(i);
  const rdvDuJour=(j)=>{const ds=`${annee}-${String(mois+1).padStart(2,"0")}-${String(j).padStart(2,"0")}`;return data.rdv.filter(r=>r.date===ds);};
  return <div style={{fontFamily:FONT_BODY}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><span style={{fontWeight:700,fontSize:19,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>Agenda</span><span style={{marginLeft:10,background:COLORS.blueprintBg,color:COLORS.blueprint,borderRadius:20,padding:"2px 12px",fontSize:12.5,fontWeight:600}}>{rdvAvenir.length} à venir</span></div>
      <button style={btnP} onClick={()=>setShowForm(true)}><Icon name="plus" size={13} style={{marginRight:5,verticalAlign:-2}}/>Nouveau RDV</button>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {[["liste","Liste"],["calendrier","Calendrier"]].map(([v,l])=><button key={v} onClick={()=>setVue(v)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${COLORS.line}`,background:vue===v?COLORS.ink:"#fff",color:vue===v?"#fff":COLORS.inkSoft,fontWeight:600,fontSize:12.5,cursor:"pointer",fontFamily:FONT_BODY}}>{l}</button>)}
    </div>
    {vue==="calendrier"&&<div style={{background:"#fff",borderRadius:14,border:`1px solid ${COLORS.line}`,padding:14,marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={()=>setMoisActuel(new Date(annee,mois-1,1))} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:COLORS.accent}}>‹</button>
        <span style={{fontWeight:700,fontSize:15,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>{MOIS[mois]} {annee}</span>
        <button onClick={()=>setMoisActuel(new Date(annee,mois+1,1))} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:COLORS.accent}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,textAlign:"center"}}>
        {JOURS.map(j=><div key={j} style={{fontSize:10.5,fontWeight:700,color:COLORS.inkSoft,padding:"4px 0"}}>{j}</div>)}
        {jours.map((j,i)=>{const rdvJ=j?rdvDuJour(j):[];const ds=j?`${annee}-${String(mois+1).padStart(2,"0")}-${String(j).padStart(2,"0")}`:"";const isT=ds===TODAY;
          return <div key={i} style={{minHeight:38,borderRadius:8,background:isT?COLORS.blueprintBg:j?COLORS.lineSoft:"transparent",border:isT?`2px solid ${COLORS.blueprint}`:"1px solid transparent",padding:4}}>
            {j&&<div style={{fontSize:11.5,fontWeight:isT?700:400,color:isT?COLORS.blueprint:COLORS.ink}}>{j}</div>}
            {rdvJ.map(r=><div key={r.id} style={{background:TYPE_RDV[r.type]?.bg,borderRadius:4,fontSize:9,color:TYPE_RDV[r.type]?.color,fontWeight:600,padding:"1px 3px",marginTop:2,overflow:"hidden"}}>{r.heure}</div>)}
          </div>;})}
      </div>
    </div>}
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      {rdvAvenir.map(r=>{const tc=TYPE_RDV[r.type]||{};return <div key={r.id} style={{background:"#fff",borderLeft:`3px solid ${tc.color}`,border:`1px solid ${COLORS.line}`,borderRadius:12,padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:COLORS.ink,fontSize:14.5}}>{r.titre}</div>
            {r.client&&<div style={{fontSize:12.5,color:COLORS.inkSoft,marginTop:2}}>{r.client}</div>}
            <div style={{fontSize:11.5,color:COLORS.inkSoft,marginTop:4,fontFamily:FONT_MONO}}>{new Date(r.date+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})} · {r.heure} · {r.duree}min</div>
            {r.notes&&<div style={{fontSize:12,color:COLORS.ink,marginTop:6,padding:"6px 10px",background:COLORS.lineSoft,borderRadius:6}}>{r.notes}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginLeft:10,alignItems:"flex-end"}}>
            <Badge config={TYPE_RDV} value={r.type}/>
            <button onClick={()=>del(r.id)} style={btnD}>Suppr.</button>
          </div>
        </div>
      </div>;})}
      {rdvAvenir.length===0&&<div style={{textAlign:"center",color:COLORS.inkSoft,padding:28,fontSize:13.5}}>Aucun rendez-vous à venir</div>}
    </div>
    {rdvPasses.length>0&&<div style={{marginTop:20}}>
      <div style={{fontWeight:600,color:COLORS.inkSoft,fontSize:12.5,marginBottom:8,textTransform:"uppercase",letterSpacing:0.4}}>Passés ({rdvPasses.length})</div>
      {rdvPasses.map(r=><div key={r.id} style={{background:COLORS.lineSoft,border:`1px solid ${COLORS.line}`,borderRadius:10,padding:"9px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,opacity:0.65}}>
        <div><span style={{fontSize:13,color:COLORS.inkSoft}}>{r.titre}</span><span style={{fontSize:11.5,color:COLORS.inkSoft,marginLeft:8,fontFamily:FONT_MONO}}>{new Date(r.date+"T12:00:00").toLocaleDateString("fr-FR")}</span></div>
        <button onClick={()=>del(r.id)} style={btnD}>Suppr.</button>
      </div>)}
    </div>}
    {showForm&&<Modal title="Nouveau rendez-vous" onClose={()=>setShowForm(false)}>
      <IR label="Titre *"><input style={inp} value={form.titre} onChange={e=>setForm(f=>({...f,titre:e.target.value}))} placeholder="Ex : Visite chantier Dupont"/></IR>
      <IR label="Client"><input style={inp} value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Nom du client"/></IR>
      <IR label="Type"><select style={inp} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{Object.entries(TYPE_RDV).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></IR>
      <div style={{display:"flex",gap:10}}>
        <IR label="Date"><input type="date" style={inp} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></IR>
        <IR label="Heure"><input type="time" style={inp} value={form.heure} onChange={e=>setForm(f=>({...f,heure:e.target.value}))}/></IR>
      </div>
      <IR label="Durée"><select style={inp} value={form.duree} onChange={e=>setForm(f=>({...f,duree:e.target.value}))}><option value={30}>30 min</option><option value={45}>45 min</option><option value={60}>1h</option><option value={90}>1h30</option><option value={120}>2h</option><option value={180}>3h</option><option value={480}>Journée</option></select></IR>
      <IR label="Notes"><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Infos…"/></IR>
      <div style={{display:"flex",gap:10}}><button style={btnP} onClick={add}>Ajouter</button><button style={btnS} onClick={()=>setShowForm(false)}>Annuler</button></div>
    </Modal>}
  </div>;
}

// ── TÂCHES ────────────────────────────────────────────────────────────────────
function Taches({data,api}){
  const [showForm,setShowForm]=useState(false);

  const add=()=>{if(!form.titre.trim())return;api.ajouterItem("taches",{...form,fait:false});setForm({titre:"",priorite:"moyenne",echeance:""});setShowForm(false);};
  const toggle=(id)=>{const t=data.taches.find(x=>x.id===id);api.modifierItem("taches",id,{fait:!t.fait});};
  const del=(id)=>api.supprimerItem("taches",id);
  const todo=data.taches.filter(t=>!t.fait),done=data.taches.filter(t=>t.fait);

        </div>

          <select value={d.statut} onChange={e=>updStatut(d.id,e.target.value)} style={{border:"none",background:STATUT_DEVIS[d.statut]?.bg,color:STATUT_DEVIS[d.statut]?.color,borderRadius:6,padding:"3px 8px",fontWeight:600,fontSize:11.5,cursor:"pointer",fontFamily:FONT_BODY}}>{Object.entries(STATUT_DEVIS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

      {urgent.map(t=><div key={t.id} style={{background:"#fff",borderRadius:10,padding:"9px 12px",marginBottom:6}}><div style={{fontWeight:600,fontSize:13.5,color:COLORS.ink}}>{t.titre}</div></div>)}

        <div style={{fontSize:19,fontWeight:800,color:COLORS.blueprint,fontFamily:FONT_MONO}}>{h}h</div>

        <div style={{background:COLORS.blueprintBg,borderRadius:10,padding:"9px 12px",textAlign:"center",minWidth:52,flexShrink:0}}><div style={{fontWeight:800,fontSize:16,color:COLORS.blueprint,fontFamily:FONT_MONO}}>{t.heures}h</div></div>

// HELPERS ABONNEMENT (appels aux Edge Functions Supabase)

const appelerFonction = async (nom, body) => {
  if (!supabaseClient) return null;
  const { data: session } = await supabaseClient.auth.getSession();
  const token = session?.session?.access_token;
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${nom}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`,
      "apikey": SUPABASE_KEY,
    },
    body: JSON.stringify(body),
  });
  return res.json();
};

// ── BIOMÉTRIE (Face ID / Touch ID / empreinte Android) ────────────────────────
// Accès direct au plugin natif via le pont Capacitor, sans import npm (pas de bundler ici).
const Biometric = (typeof window !== "undefined" && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.NativeBiometric) || null;
const BIOMETRIC_SERVER = "gestchantier.app";
const REMEMBER_KEY = "gc_remember_email";
const BIOMETRIC_ENABLED_KEY = "gc_biometric_enabled";

function Login({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const [remember, setRemember] = useState(false);
  const [bioAvailable, setBioAvailable] = useState(false);
  const [bioEnabled, setBioEnabled] = useState(false);

  useEffect(() => {
    const saved = localStorage.getItem(REMEMBER_KEY);
    if (saved) { setEmail(saved); setRemember(true); }
    setBioEnabled(localStorage.getItem(BIOMETRIC_ENABLED_KEY) === "1");
    if (Biometric) {
      Biometric.isAvailable().then(r => setBioAvailable(!!(r && r.isAvailable))).catch(() => setBioAvailable(false));
    }
  }, []);

  const s2 = {width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${COLORS.line}`,fontSize:15,color:COLORS.ink,boxSizing:"border-box",outline:"none",marginBottom:12,fontFamily:FONT_BODY};

  const proposerBiometrie = async (loggedEmail, loggedPassword) => {
    if (!Biometric || !bioAvailable || bioEnabled) return;
    const ok = window.confirm("Activer la connexion par Face ID / empreinte pour la prochaine fois ?");
    if (!ok) return;
    try {
      await Biometric.setCredentials({ username: loggedEmail, password: loggedPassword, server: BIOMETRIC_SERVER });
      localStorage.setItem(BIOMETRIC_ENABLED_KEY, "1");
      setBioEnabled(true);
    } catch (e) { /* annulé ou non supporté, on ignore silencieusement */ }
  };

  const handleAuth = async () => {
    if (mode === "reset") {
      if (!email) { setMessage("Indique ton email"); return; }
      if (!supabaseClient) { setMessage("Configuration Supabase manquante"); return; }
      setLoading(true);
      setMessage("");
      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + window.location.pathname,
        });
        if (error) throw error;
        setMessage("OK Email envoyé ! Vérifie ta boîte mail pour réinitialiser ton mot de passe.");
      } catch (e) {
        setMessage("Erreur : " + (e.message || "Erreur"));
      }
      setLoading(false);
      return;
    }

    if (!email || !password) { setMessage("Remplis tous les champs"); return; }
    if (!supabaseClient) { setMessage("Configuration Supabase manquante"); return; }
    setLoading(true);
    setMessage("");
    try {
      if (mode === "signup") {
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) throw error;
        setMessage("OK Compte créé ! Vérifie ta boîte email pour confirmer ton inscription.");
      } else {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        if (remember) localStorage.setItem(REMEMBER_KEY, email); else localStorage.removeItem(REMEMBER_KEY);
        await proposerBiometrie(email, password);
        onLogin(data.user);
      }
    } catch (e) {
      const msg = e.message || "Erreur";
      if (msg.includes("Invalid login")) setMessage("Erreur : email ou mot de passe incorrect");
      else if (msg.includes("already registered")) setMessage("Erreur : cet email est déjà inscrit");
      else if (msg.includes("Email not confirmed")) setMessage("Confirme d'abord ton email (vérifie ta boîte)");
      else setMessage("Erreur : " + msg);
    }
    setLoading(false);
  };

  const loginBiometrique = async () => {
    if (!Biometric) return;
    setLoading(true);
    setMessage("");
    try {
      await Biometric.verifyIdentity({ reason: "Connexion à Gest'Chantier", title: "Authentification", subtitle: "", description: "" });
      const creds = await Biometric.getCredentials({ server: BIOMETRIC_SERVER });
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email: creds.username, password: creds.password });
      if (error) throw error;
      onLogin(data.user);
    } catch (e) {
      setMessage("Erreur : authentification biométrique annulée ou échouée");
    }
    setLoading(false);
  };

  const isOk = message.startsWith("OK");

  return (
    <div style={{minHeight:"100vh",background:COLORS.ink,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT_BODY,padding:20,paddingTop:"calc(20px + env(safe-area-inset-top))",paddingBottom:"calc(20px + env(safe-area-inset-bottom))"}}>
      <div style={{background:"#fff",borderRadius:20,padding:36,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <img src={LOGO_URI} style={{width:52,height:52,borderRadius:16,margin:"0 auto 12px",display:"block",objectFit:"cover"}}/>
          <div style={{fontWeight:700,fontSize:24,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>Gest'Chantier</div>
          <div style={{color:COLORS.inkSoft,fontSize:14,marginTop:4}}>Gestion pour artisans & BTP</div>
        </div>

        {mode === "login" && bioAvailable && bioEnabled && <>
          <button onClick={loginBiometrique} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px solid ${COLORS.ink}`,background:"#fff",color:COLORS.ink,fontWeight:700,fontSize:14,cursor:loading?"default":"pointer",fontFamily:FONT_BODY,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Icon name="check" size={16} color={COLORS.ink}/>Se connecter avec Face ID
          </button>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style={{flex:1,height:1,background:COLORS.line}}/>
            <span style={{fontSize:11,color:COLORS.inkSoft,textTransform:"uppercase",letterSpacing:0.4}}>ou</span>
            <div style={{flex:1,height:1,background:COLORS.line}}/>
          </div>
        </>}

        {mode !== "reset" && <div style={{display:"flex",gap:8,marginBottom:24,background:COLORS.lineSoft,borderRadius:10,padding:4}}>
          <button onClick={()=>{setMode("login");setMessage("");}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:mode==="login"?COLORS.ink:"transparent",color:mode==="login"?"#fff":COLORS.inkSoft,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:FONT_BODY}}>Connexion</button>
          <button onClick={()=>{setMode("signup");setMessage("");}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:mode==="signup"?COLORS.ink:"transparent",color:mode==="signup"?"#fff":COLORS.inkSoft,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:FONT_BODY}}>Inscription</button>
        </div>}

        {mode === "reset" && <div style={{textAlign:"center",fontSize:13,color:COLORS.inkSoft,marginBottom:20,lineHeight:1.5}}>
          Indique ton email, on t'envoie un lien pour créer un nouveau mot de passe.
        </div>}

        <label style={{display:"block",fontSize:11.5,fontWeight:700,color:COLORS.inkSoft,marginBottom:4,textTransform:"uppercase"}}>Email</label>
        <input style={s2} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="vous@entreprise.fr"/>

        {mode !== "reset" && <>
          <label style={{display:"block",fontSize:11.5,fontWeight:700,color:COLORS.inkSoft,marginBottom:4,textTransform:"uppercase"}}>Mot de passe</label>
          <input style={s2} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handleAuth()}/>
        </>}

        {mode === "login" && <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,cursor:"pointer",fontSize:13,color:COLORS.inkSoft}}>
          <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)} style={{width:16,height:16,cursor:"pointer",accentColor:COLORS.accent}}/>
          Se souvenir de mon identifiant
        </label>}

        {message && <div style={{padding:"10px 14px",borderRadius:8,background:isOk?COLORS.successBg:COLORS.dangerBg,color:isOk?COLORS.success:COLORS.danger,fontSize:13,marginBottom:12,lineHeight:1.5}}>{message.replace(/^OK /,"")}</div>}

        <button onClick={handleAuth} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:loading?COLORS.inkSoft:COLORS.accent,color:"#fff",fontWeight:700,fontSize:15,cursor:loading?"default":"pointer",fontFamily:FONT_BODY}}>
          {loading ? "Chargement..." : (mode==="login" ? "Se connecter" : mode==="signup" ? "Créer mon compte" : "Envoyer le lien")}
        </button>

        {mode === "login" && <div style={{textAlign:"center",marginTop:14}}>
          <button onClick={()=>{setMode("reset");setMessage("");}} style={{background:"none",border:"none",color:COLORS.blueprint,fontSize:13,fontWeight:600,cursor:"pointer"}}>Mot de passe oublié ?</button>
        </div>}

        {mode === "reset" && <div style={{textAlign:"center",marginTop:14}}>
          <button onClick={()=>{setMode("login");setMessage("");}} style={{background:"none",border:"none",color:COLORS.inkSoft,fontSize:13,fontWeight:600,cursor:"pointer"}}>← Retour à la connexion</button>
        </div>}

        {mode==="signup" && <div style={{textAlign:"center",fontSize:12,color:COLORS.inkSoft,marginTop:16,lineHeight:1.5}}>
          14 jours d'essai gratuit<br/>Aucune carte bancaire requise
        </div>}
      </div>
    </div>
  );
}

// Tables synchronisées avec Supabase
const TABLES = ["clients","chantiers","devis","factures","rdv","taches","temps"];

const versDB = (item, table) => {
  const o = {...item};
  delete o.id;
  if (o.dateEmission !== undefined) { o.date_emission = o.dateEmission || null; delete o.dateEmission; }
  if (o.dateEcheance !== undefined) { o.date_echeance = o.dateEcheance || null; delete o.dateEcheance; }
  if (o.adresseClient !== undefined) { o.adresse_client = o.adresseClient; delete o.adresseClient; }
  ["echeance","debut","fin","date"].forEach(k => { if (o[k] === "") o[k] = null; });
  return o;
};
const depuisDB = (row) => {
  const o = {...row};
  if (o.date_emission !== undefined) { o.dateEmission = o.date_emission; delete o.date_emission; }
  if (o.date_echeance !== undefined) { o.dateEcheance = o.date_echeance; delete o.date_echeance; }
  if (o.adresse_client !== undefined) { o.adresseClient = o.adresse_client; delete o.adresse_client; }
  return o;
};

function MainApp({ session, onLogout }){
  const [tab,setTab]=useState("dashboard");
  const [data,setData]=useState({
    clients:[], chantiers:[], devis:[], factures:[], rdv:[], taches:[], temps:[],
    entreprise:{nom:"",siret:"",adresse:"",cp:"",ville:"",tel:"",email:"",tva:""},
  });
  const [chargement, setChargement] = useState(true);

  useEffect(() => {
    const charger = async () => {
      if (!supabaseClient) { setChargement(false); return; }
      const nouvelles = {};
      for (const table of TABLES) {
        const { data: rows, error } = await supabaseClient.from(table).select("*").order("created_at",{ascending:true});
        nouvelles[table] = error ? [] : (rows||[]).map(depuisDB);
      }
      const { data: prof } = await supabaseClient.from("profils").select("*").eq("id", session.user.id).maybeSingle();
      nouvelles.entreprise = prof || {nom:"",siret:"",adresse:"",cp:"",ville:"",tel:"",email:session.user.email,tva:""};
      setData(d => ({...d, ...nouvelles}));
      setChargement(false);
    };
    charger();
  }, []);

  const ajouterItem = async (table, item) => {
    if (!supabaseClient) return;
    const payload = {...versDB(item, table), user_id: session.user.id};
    const { data: row, error } = await supabaseClient.from(table).insert(payload).select().single();
    if (!error && row) setData(d => ({...d, [table]: [...d[table], depuisDB(row)]}));
    else if (error) alert("Erreur : " + error.message);
  };
  const supprimerItem = async (table, id) => {
    if (!supabaseClient) return;
    await supabaseClient.from(table).delete().eq("id", id);
    setData(d => ({...d, [table]: d[table].filter(x => x.id !== id)}));
  };
  const modifierItem = async (table, id, champs) => {
    if (!supabaseClient) return;
    await supabaseClient.from(table).update(versDB({...champs}, table)).eq("id", id);
    setData(d => ({...d, [table]: d[table].map(x => x.id === id ? {...x, ...champs} : x)}));
  };
  const sauverEntreprise = async (entreprise) => {
    if (!supabaseClient) return;
    await supabaseClient.from("profils").upsert({...entreprise, id: session.user.id});
    setData(d => ({...d, entreprise}));
  };
  const api = { ajouterItem, supprimerItem, modifierItem, sauverEntreprise };

  if (chargement) {
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:COLORS.bg,fontFamily:FONT_BODY}}>
      <div style={{textAlign:"center",color:COLORS.inkSoft}}>
        <Icon name="cloud" size={32} color={COLORS.inkSoft} style={{marginBottom:12}}/>
        <div>Chargement de vos données...</div>
      </div>
    </div>;
  }
  const rdvAuj=data.rdv.filter(r=>r.date===TODAY);
  const tabs=[
    {id:"dashboard",icon:"home",title:"Accueil",count:0},
    {id:"agenda",icon:"calendar",title:"Agenda",count:rdvAuj.length},
    {id:"taches",icon:"check",title:"Tâches",count:data.taches.filter(t=>!t.fait&&t.priorite==="haute").length},
    {id:"clients",icon:"users",title:"Clients",count:0},
    {id:"chantiers",icon:"building",title:"Chantiers",count:data.chantiers.filter(c=>c.statut==="en_cours").length},
    {id:"devis",icon:"file",title:"Devis",count:data.devis.filter(d=>d.statut==="a_faire").length},
    {id:"factures",icon:"receipt",title:"Factures",count:data.factures.filter(f=>f.statut==="impayee").length},
    {id:"temps",icon:"clock",title:"Temps",count:0},
    {id:"parametres",icon:"settings",title:"Réglages",count:0},
  ];
  const current=tabs.find(t=>t.id===tab);
  return <div style={{minHeight:"100vh",background:COLORS.bg,fontFamily:FONT_BODY,display:"flex",flexDirection:"column"}}>
    <div style={{background:COLORS.ink,padding:"calc(12px + env(safe-area-inset-top)) 18px 0",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <img src={LOGO_URI} style={{width:32,height:32,borderRadius:9,flexShrink:0,objectFit:"cover"}}/>
        <div style={{flex:1}}>
          <div style={{color:"#fff",fontWeight:700,fontSize:17,fontFamily:FONT_DISPLAY,letterSpacing:0.2}}>Gest'Chantier</div>
        </div>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:11.5,fontFamily:FONT_MONO,textAlign:"right"}}>{new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})}</div>
        <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"6px 12px",fontSize:11.5,fontWeight:600,cursor:"pointer",flexShrink:0,fontFamily:FONT_BODY}}>Déconnexion</button>
      </div>
      <div style={{display:"flex",overflowX:"auto",whiteSpace:"nowrap",gap:2}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 11px 9px",border:"none",background:"none",cursor:"pointer",borderBottom:tab===t.id?`2px solid ${COLORS.accent}`:"2px solid transparent",display:"inline-flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0,minWidth:52,position:"relative"}}>
          <Icon name={t.icon} size={17} color={tab===t.id?COLORS.accent:"rgba(255,255,255,0.5)"}/>
          <span style={{fontSize:9.5,fontWeight:tab===t.id?700:500,color:tab===t.id?COLORS.accent:"rgba(255,255,255,0.5)",fontFamily:FONT_BODY}}>{t.title}</span>
          {t.count>0&&<span style={{position:"absolute",top:2,right:6,background:COLORS.danger,color:"#fff",borderRadius:20,padding:"0 5px",fontSize:9,fontWeight:700,lineHeight:"13px"}}>{t.count}</span>}
        </button>)}
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto"}}>
      <div style={{maxWidth:760,margin:"0 auto",padding:16}}>
        {tab==="dashboard"&&<Dashboard data={data}/>}
        {tab==="agenda"&&<Agenda data={data} api={api}/>}
        {tab==="taches"&&<Taches data={data} api={api}/>}
        {tab==="clients"&&<Clients data={data} api={api}/>}
        {tab==="chantiers"&&<Chantiers data={data} api={api}/>}
        {tab==="devis"&&<Devis data={data} api={api}/>}
        {tab==="factures"&&<Factures data={data} api={api}/>}
        {tab==="temps"&&<Temps data={data} api={api}/>}
        {tab==="parametres"&&<Parametres data={data} api={api}/>}
      </div>
    </div>
  </div>;
}

function NewPassword({ onDone }) {
  const [password, setPassword] = useState("");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const s2 = {width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${COLORS.line}`,fontSize:15,color:COLORS.ink,boxSizing:"border-box",outline:"none",marginBottom:12,fontFamily:FONT_BODY};

  const valider = async () => {
    if (!password || password.length < 6) { setMessage("Erreur : 6 caractères minimum"); return; }
    setLoading(true);
    try {
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) throw error;
      setMessage("OK Mot de passe mis à jour !");
      setTimeout(onDone, 1200);
    } catch (e) {
      setMessage("Erreur : " + (e.message || "Erreur"));
    }
    setLoading(false);
  };
  const isOk = message.startsWith("OK");

  return (
    <div style={{minHeight:"100vh",background:COLORS.ink,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT_BODY,padding:20,paddingTop:"calc(20px + env(safe-area-inset-top))",paddingBottom:"calc(20px + env(safe-area-inset-bottom))"}}>
      <div style={{background:"#fff",borderRadius:20,padding:36,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.35)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <img src={LOGO_URI} style={{width:52,height:52,borderRadius:16,margin:"0 auto 12px",display:"block",objectFit:"cover"}}/>
          <div style={{fontWeight:700,fontSize:20,color:COLORS.ink,fontFamily:FONT_DISPLAY}}>Nouveau mot de passe</div>
        </div>
        <label style={{display:"block",fontSize:11.5,fontWeight:700,color:COLORS.inkSoft,marginBottom:4,textTransform:"uppercase"}}>Nouveau mot de passe</label>
        <input style={s2} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&valider()}/>
        {message && <div style={{padding:"10px 14px",borderRadius:8,background:isOk?COLORS.successBg:COLORS.dangerBg,color:isOk?COLORS.success:COLORS.danger,fontSize:13,marginBottom:12,lineHeight:1.5}}>{message.replace(/^OK /,"")}</div>}
        <button onClick={valider} disabled={loading} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:loading?COLORS.inkSoft:COLORS.accent,color:"#fff",fontWeight:700,fontSize:15,cursor:loading?"default":"pointer",fontFamily:FONT_BODY}}>
          {loading ? "Chargement..." : "Valider le nouveau mot de passe"}
        </button>
      </div>
    </div>
  );
}

function App(){
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [statutAbo, setStatutAbo] = useState(null);
  const [checkingAbo, setCheckingAbo] = useState(false);
  const [modeRecovery, setModeRecovery] = useState(false);

  useEffect(() => {
    if (!supabaseClient) { setLoading(false); return; }
    supabaseClient.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setLoading(false);
    });
    const { data: listener } = supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY") setModeRecovery(true);
      setSession(session);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  const verifierAbonnement = async (currentSession) => {
    if (!currentSession?.user?.id) return;
    setCheckingAbo(true);
    try {
      const result = await appelerFonction("check-subscription", { userId: currentSession.user.id });
      setStatutAbo(result?.status || "no_subscription");
    } catch (e) {
      setStatutAbo("no_subscription");
    }
    setCheckingAbo(false);
  };

  useEffect(() => {
    if (session?.user?.id) verifierAbonnement(session);
  }, [session?.user?.id]);

  const handleLogout = async () => {
    if (supabaseClient) await supabaseClient.auth.signOut();
    setSession(null);
    setStatutAbo(null);
  };

  if (loading) {
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:COLORS.ink,color:"#fff",fontFamily:FONT_BODY}}>
      <div style={{textAlign:"center"}}>
        <img src={LOGO_URI} style={{width:56,height:56,borderRadius:14,marginBottom:12}}/>
        <div>Chargement de Gest'Chantier...</div>
      </div>
    </div>;
  }

  if (modeRecovery) {
    return <NewPassword onDone={() => { setModeRecovery(false); window.location.href = window.location.origin + window.location.pathname; }} />;
  }

  if (!session) {
    return <Login onLogin={(user) => setSession({ user })} />;
  }

  if (checkingAbo || statutAbo === null) {
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:COLORS.ink,color:"#fff",fontFamily:FONT_BODY}}>
      <div style={{textAlign:"center"}}>
        <Icon name="card" size={32} color="#fff" style={{marginBottom:12}}/>
        <div>Vérification de l'abonnement...</div>
      </div>
    </div>;
  }

  const actif = ["trialing","active"].includes(statutAbo);
  if (!actif) {
    return <PageAbonnement session={session} statut={statutAbo} onRefresh={() => verifierAbonnement(session)} onLogout={handleLogout} />;
  }

  return <MainApp session={session} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
